name: Build coreDVD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          libsfml-dev \
          libavformat-dev \
          libavcodec-dev \
          libswscale-dev \
          libavutil-dev
    
    - name: Compile
      run: |
        g++ main.cpp -o coredvd-linux \
          -lsfml-graphics -lsfml-window -lsfml-system \
          -lavformat -lavcodec -lswscale -lavutil \
          -lpthread -std=c++17 -O2
    
    - uses: actions/upload-artifact@v4
      with:
        name: coredvd-linux
        path: coredvd-linux

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: |
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-SFML
          mingw-w64-x86_64-ffmpeg
    
    - name: Compile
      shell: msys2 {0}
      run: |
        g++ main.cpp -o coredvd-windows.exe \
          -lsfml-graphics -lsfml-window -lsfml-system \
          -lavformat -lavcodec -lswscale -lavutil \
          -static-libgcc -static-libstdc++ \
          -lpthread -std=c++17 -O2
    
    - uses: actions/upload-artifact@v4
      with:
        name: coredvd-windows
        path: coredvd-windows.exe

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        brew install sfml ffmpeg
    
    - name: Compile
      run: |
        g++ main.cpp -o coredvd-macos \
          -lsfml-graphics -lsfml-window -lsfml-system \
          -lavformat -lavcodec -lswscale -lavutil \
          -lpthread -std=c++17 -O2
    
    - uses: actions/upload-artifact@v4
      with:
        name: coredvd-macos
        path: coredvd-macos
